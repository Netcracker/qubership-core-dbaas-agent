{{- if eq .Values.SERVICE_MESH_TYPE "Istio" }}
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-private-routes'
  labels:
    app.kubernetes.io/name: '{{ printf "%s-private-routes" .Values.SERVICE_NAME }}'
    app.kubernetes.io/instance: '{{ printf "%s-private-routes-%s" .Values.SERVICE_NAME .Values.NAMESPACE | trunc 63 | trimSuffix "-" }'
    app.kubernetes.io/version: '{{ .Chart.AppVersion }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'Helm'
    app.kubernetes.io/processed-by-operator: 'istiod'
spec:
  parentRefs:
    - name: {{ .Values.ISTIO_PRIVATE_GATEWAY_NAME }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/dbaas/records/databases/db-owner-roles"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME }}
          port: 8080
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: '{{ .Values.SERVICE_NAME }}-internal-routes'
  labels:
    app.kubernetes.io/name: '{{ printf "%s-internal-routes" .Values.SERVICE_NAME }}'
    app.kubernetes.io/instance: '{{ printf "%s-internal-routes-%s" .Values.SERVICE_NAME .Values.NAMESPACE | trunc 63 | trimSuffix "-" }'
    app.kubernetes.io/version: '{{ .Chart.AppVersion }}'
    app.kubernetes.io/component: '{{ .Values.SERVICE_NAME }}'
    app.kubernetes.io/part-of: 'Cloud-Core'
    app.kubernetes.io/managed-by: 'Helm'
    app.kubernetes.io/processed-by-operator: 'istiod'
spec:
  parentRefs:
    - kind: Service
      name: {{ .Values.INTERNAL_SERVICE_NAME }}
      group: ""
      port: 8080
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: "/api/v1/dbaas/records/databases/db-owner-roles"
      backendRefs:
        - name: {{ .Values.SERVICE_NAME}}
          port: 8080

{{- end }}
